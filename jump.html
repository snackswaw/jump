<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>快捷导航 · 个人工具</title>
    <meta name="description" content="个人快捷导航工具，支持自定义链接">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 样式保持不变，使用之前的完整样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        
        /* 登录选择页 */
        .choice-page { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; }
        .choice-page h2 { margin-bottom: 30px; color: #1e2b3c; }
        .choice-btn { 
            padding: 15px 30px; 
            margin: 10px; 
            font-size: 18px; 
            color: white; 
            border: none; 
            border-radius: 60px; 
            cursor: pointer; 
            min-width: 180px;
        }
        .admin-login { background: #0078d4; }
        .guest-enter { background: #4CAF50; }

        /* 登录框 */
        .login-box { background: white; padding: 35px 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); width: 400px; max-width: 100%; display: none; }
        .login-box h2 { text-align: center; margin-bottom: 20px; color: #333; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 6px; color: #666; }
        .input-group input { width: 100%; padding: 14px 18px; border: 2px solid #ddd; border-radius: 40px; font-size: 16px; }
        .input-group input:focus { border-color: #0078d4; outline: none; }
        .login-btn { 
            width: 100%; 
            padding: 14px; 
            background: #0078d4; 
            color: white; 
            border: none; 
            border-radius: 60px; 
            font-size: 17px; 
            cursor: pointer; 
            margin-top: 12px; 
        }
        .error-msg { color: #d32f2f; text-align: center; margin-top: 15px; display: none; }
        .back-link { margin-top: 20px; text-align: center; }
        .back-link button { background: transparent; border: 2px solid #7f8c8d; color: #2c3e50; padding: 10px 25px; border-radius: 40px; cursor: pointer; }

        /* 主页 */
        .home-container { text-align: center; padding: 40px 30px; background: white; border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-width: 900px; width: 100%; display: none; }
        .home-container h2 { margin-bottom: 30px; color: #333; }
        .btn-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin: 30px 0; }
        .btn { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px; 
            font-size: 18px; 
            color: white; 
            border: none; 
            border-radius: 60px; 
            cursor: pointer; 
            text-decoration: none;
            min-width: 140px;
        }
        .bing { background: #0078d4; }
        .bilibili { background: #fb7299; }
        .douyin { background: #fe2c55; }
        .youtube { background: #ff0000; }
        .minecraft { background: #4CAF50; }
        .mcjs { background: #2196F3; }
        .add-web { background: #ff9800; } 
        .logout-btn { background: #ff4444; }
        .logout-row { margin-top: 20px; }
        
        /* 卡密提示 */
        .card-hint { background: #e3f2fd; padding: 8px 20px; border-radius: 60px; color: #0078d4; display: inline-block; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <!-- 个人快捷导航工具 - 主界面 -->
    
    <!-- 登录选择页 -->
    <div id="choice-page" class="choice-page">
        <h2>⚡ 快捷导航</h2>
        <div class="card-hint">管理员卡密: FKUS6FA3A4G7A2V7</div>
        <button class="choice-btn admin-login" onclick="showLogin()">管理员登录</button>
        <button class="choice-btn guest-enter" onclick="enterGuest()">游客进入</button>
    </div>

    <!-- 管理员登录页（卡密登录） -->
    <div id="login-page" class="login-box">
        <h2>管理员验证</h2>
        <div class="input-group">
            <label for="cardKey">卡密</label>
            <input type="text" id="cardKey" placeholder="请输入卡密" value="FKUS6FA3A4G7A2V7">
        </div>
        <button class="login-btn" onclick="loginWithCard()">登录</button>
        <div id="error-msg" class="error-msg">卡密错误</div>
        <div class="back-link">
            <button onclick="backToChoice()">返回</button>
        </div>
    </div>

    <!-- 主页 -->
    <div id="home-page" class="home-container">
        <h2>我的导航</h2>
        <div class="btn-grid" id="btn-grid-container">
            <a href="https://cn.bing.com" target="_blank" class="btn bing">必应</a>
            <a href="https://www.bilibili.com" target="_blank" class="btn bilibili">B站</a>
            <a href="https://www.douyin.com" target="_blank" class="btn douyin">抖音</a>
            <a href="https://www.youtube.com" target="_blank" class="btn youtube">YouTube</a>
            <a href="https://www.minecraft.net" target="_blank" class="btn minecraft">Minecraft</a>
            <a href="https://mcjs.cc" target="_blank" class="btn mcjs">MC JS</a>
            <button class="btn add-web" id="add-web-btn" style="display:none;" onclick="addWeb()">+ 添加</button>
        </div>
        <div class="logout-row">
            <button class="btn logout-btn" onclick="logout()">退出</button>
        </div>
    </div>

    <script>
        (function() {
            const VALID_CARD = "FKUS6FA3A4G7A2V7";
            
            const choicePage = document.getElementById('choice-page');
            const loginPage = document.getElementById('login-page');
            const homePage = document.getElementById('home-page');
            const addWebBtn = document.getElementById('add-web-btn');
            const errorMsg = document.getElementById('error-msg');
            const cardInput = document.getElementById('cardKey');

            // 初始状态
            choicePage.style.display = 'block';
            loginPage.style.display = 'none';
            homePage.style.display = 'none';
            if (addWebBtn) addWebBtn.style.display = 'none';

            window.showLogin = function() {
                choicePage.style.display = 'none';
                loginPage.style.display = 'block';
                homePage.style.display = 'none';
                if (errorMsg) errorMsg.style.display = 'none';
            };

            window.enterGuest = function() {
                choicePage.style.display = 'none';
                loginPage.style.display = 'none';
                homePage.style.display = 'block';
                if (addWebBtn) addWebBtn.style.display = 'none';
            };

            window.backToChoice = function() {
                choicePage.style.display = 'block';
                loginPage.style.display = 'none';
                homePage.style.display = 'none';
                if (errorMsg) errorMsg.style.display = 'none';
            };

            window.loginWithCard = function() {
                const enteredCard = cardInput ? cardInput.value.trim() : '';
                if (enteredCard === VALID_CARD) {
                    choicePage.style.display = 'none';
                    loginPage.style.display = 'none';
                    homePage.style.display = 'block';
                    if (addWebBtn) addWebBtn.style.display = 'inline-flex';
                    if (errorMsg) errorMsg.style.display = 'none';
                } else {
                    if (errorMsg) errorMsg.style.display = 'block';
                }
            };

            window.logout = function() {
                choicePage.style.display = 'block';
                loginPage.style.display = 'none';
                homePage.style.display = 'none';
                if (addWebBtn) addWebBtn.style.display = 'none';
                if (errorMsg) errorMsg.style.display = 'none';
                if (cardInput) cardInput.value = 'FKUS6FA3A4G7A2V7';
            };

            window.addWeb = function() {
                const name = prompt('请输入网站名称：');
                let url = prompt('请输入网址（需包含 http:// 或 https://）：');
                if (name && url) {
                    if (!url.match(/^https?:\/\//i)) {
                        alert('网址必须以 http:// 或 https:// 开头');
                        return;
                    }
                    const container = document.getElementById('btn-grid-container');
                    const newBtn = document.createElement('a');
                    newBtn.className = 'btn';
                    newBtn.style.backgroundColor = getRandomColor();
                    newBtn.href = url;
                    newBtn.target = '_blank';
                    newBtn.textContent = name;
                    container.insertBefore(newBtn, document.getElementById('add-web-btn'));
                }
            };

            window.getRandomColor = function() {
                const colors = ['#e67e22', '#9b59b6', '#3498db', '#1abc9c', '#e74c3c'];
                return colors[Math.floor(Math.random() * colors.length)];
            };
        })();
    </script>
</body>
</html>
