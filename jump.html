
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>常用网站导航</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        .button { 
            display: inline-block; 
            padding: 15px 30px; 
            margin: 10px; 
            background-color: #0078d4; 
            color: white; 
            text-decoration: none; 
            border-radius: 5px; 
            font-size: 18px;
        }
        .button:hover { background-color: #005a9e; }
    </style>
</head>
<body>
    <h1>常用网站导航</h1>
    <a href="https://cn.bing.com" class="button">访问必应</a>
    <a href="https://www.bilibili.com" class="button">访问哔哩哔哩</a>
    <a href="https://www.douyin.com" class="button">访问抖音</a>
</body>
</html>
